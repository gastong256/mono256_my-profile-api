name: Release Images and Deploy

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-images:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      runtime_image: ${{ steps.meta.outputs.runtime_image }}
      migrate_image: ${{ steps.meta.outputs.migrate_image }}
      seed_image: ${{ steps.meta.outputs.seed_image }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag='${{ github.event.release.tag_name }}'
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid release tag format: $release_tag"
            echo "Expected: vX.Y.Z"
            exit 1
          fi

          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_lc=$(echo "$repo_name" | tr '[:upper:]' '[:lower:]')
          release_sha=$(git rev-parse --short=12 HEAD)

          runtime_image="ghcr.io/${owner_lc}/${repo_lc}-runtime"
          migrate_image="ghcr.io/${owner_lc}/${repo_lc}-migrate"
          seed_image="ghcr.io/${owner_lc}/${repo_lc}-seed"

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "runtime_image=$runtime_image" >> "$GITHUB_OUTPUT"
          echo "migrate_image=$migrate_image" >> "$GITHUB_OUTPUT"
          echo "seed_image=$seed_image" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.runtime_image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.runtime_image }}:sha-${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrate
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.migrate_image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.migrate_image }}:sha-${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push seed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: seed
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.seed_image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.seed_image }}:sha-${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-migrate-job:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: publish-images
    if: ${{ vars.NORTHFLANK_PROJECT_ID != '' && vars.NORTHFLANK_MIGRATE_JOB_ID != '' && vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID != '' && secrets.NORTHFLANK_API_KEY != '' }}

    steps:
      - name: Point migrate job to released image
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ vars.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ vars.NORTHFLANK_MIGRATE_JOB_ID }}
          image-path: ${{ needs.publish-images.outputs.migrate_image }}:${{ needs.publish-images.outputs.release_tag }}
          credentials-id: ${{ vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID }}

      - name: Run migrate job
        id: run-migrate
        shell: bash
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ vars.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_MIGRATE_JOB_ID: ${{ vars.NORTHFLANK_MIGRATE_JOB_ID }}
        run: |
          set -euo pipefail

          response=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $NORTHFLANK_API_KEY" \
            -d '{}' \
            "https://api.northflank.com/v1/projects/$NORTHFLANK_PROJECT_ID/jobs/$NORTHFLANK_MIGRATE_JOB_ID/runs")

          echo "$response"

          run_id=$(echo "$response" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{try{const json=JSON.parse(data);process.stdout.write(json?.data?.id ?? '');}catch{process.stdout.write('');}});")
          if [ -z "$run_id" ]; then
            echo "Could not create migrate job run"
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for migrate job completion
        shell: bash
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT_ID: ${{ vars.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_MIGRATE_JOB_ID: ${{ vars.NORTHFLANK_MIGRATE_JOB_ID }}
          NORTHFLANK_RUN_ID: ${{ steps.run-migrate.outputs.run_id }}
        run: |
          set -euo pipefail

          for _ in $(seq 1 60); do
            response=$(curl -sS \
              -H "Authorization: Bearer $NORTHFLANK_API_KEY" \
              "https://api.northflank.com/v1/projects/$NORTHFLANK_PROJECT_ID/jobs/$NORTHFLANK_MIGRATE_JOB_ID/runs/$NORTHFLANK_RUN_ID")

            status=$(echo "$response" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{try{const json=JSON.parse(data);process.stdout.write(json?.data?.status ?? '');}catch{process.stdout.write('');}});")
            concluded=$(echo "$response" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{try{const json=JSON.parse(data);process.stdout.write(String(json?.data?.concluded ?? false));}catch{process.stdout.write('false');}});")

            echo "Migrate run status: $status"

            if [ "$concluded" = "true" ]; then
              if [ "$status" = "SUCCESS" ]; then
                exit 0
              fi

              echo "Migrate job concluded with non-success status: $status"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for migrate job completion"
          exit 1

  deploy-api-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - publish-images
      - deploy-migrate-job
    if: ${{ vars.NORTHFLANK_PROJECT_ID != '' && vars.NORTHFLANK_SERVICE_ID != '' && vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID != '' && secrets.NORTHFLANK_API_KEY != '' && (needs.deploy-migrate-job.result == 'success' || needs.deploy-migrate-job.result == 'skipped') }}

    steps:
      - name: Deploy released runtime image to API service
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ vars.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ vars.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ needs.publish-images.outputs.runtime_image }}:${{ needs.publish-images.outputs.release_tag }}
          credentials-id: ${{ vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID }}
