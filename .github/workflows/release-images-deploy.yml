name: Release Images and Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Immutable release tag to publish/deploy (for example: v1.2.3)'
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-images:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.resolve-tag.outputs.release_tag }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      runtime_image: ${{ steps.meta.outputs.runtime_image }}
      migrate_image: ${{ steps.meta.outputs.migrate_image }}
      seed_image: ${{ steps.meta.outputs.seed_image }}

    steps:
      - name: Resolve release tag
        id: resolve-tag
        shell: bash
        run: |
          set -euo pipefail

          release_tag='${{ github.event.release.tag_name || github.event.inputs.release_tag }}'

          if [ -z "$release_tag" ]; then
            echo "release_tag is required"
            exit 1
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid release tag format: $release_tag"
            echo "Expected: vX.Y.Z"
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout resolved release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-tag.outputs.release_tag }}

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag='${{ steps.resolve-tag.outputs.release_tag }}'

          owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_lc=$(echo "$repo_name" | tr '[:upper:]' '[:lower:]')
          release_sha=$(git rev-parse --short=12 HEAD)

          runtime_image="ghcr.io/${owner_lc}/${repo_lc}-runtime"
          migrate_image="ghcr.io/${owner_lc}/${repo_lc}-migrate"
          seed_image="ghcr.io/${owner_lc}/${repo_lc}-seed"

          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "runtime_image=$runtime_image" >> "$GITHUB_OUTPUT"
          echo "migrate_image=$migrate_image" >> "$GITHUB_OUTPUT"
          echo "seed_image=$seed_image" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.runtime_image }}:${{ steps.resolve-tag.outputs.release_tag }}
            ${{ steps.meta.outputs.runtime_image }}:sha-${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: migrate
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.migrate_image }}:${{ steps.resolve-tag.outputs.release_tag }}
            ${{ steps.meta.outputs.migrate_image }}:sha-${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push seed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: seed
          push: true
          provenance: false
          tags: |
            ${{ steps.meta.outputs.seed_image }}:${{ steps.resolve-tag.outputs.release_tag }}
            ${{ steps.meta.outputs.seed_image }}:sha-${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-migrate-job:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: publish-images
    if: ${{ vars.NORTHFLANK_PROJECT_ID != '' && vars.NORTHFLANK_MIGRATE_JOB_ID != '' && vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID != '' }}
    env:
      NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}

    steps:
      - name: Preflight deploy secret check
        id: preflight
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NORTHFLANK_API_KEY:-}" ]; then
            echo "Northflank API key is not configured, skipping deploy-migrate-job."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Point migrate job to released image
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        shell: bash
        env:
          NORTHFLANK_PROJECT_ID: ${{ vars.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_MIGRATE_JOB_ID: ${{ vars.NORTHFLANK_MIGRATE_JOB_ID }}
          NORTHFLANK_REGISTRY_CREDENTIALS_ID: ${{ vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID }}
          RELEASED_MIGRATE_IMAGE: ${{ needs.publish-images.outputs.migrate_image }}:${{ needs.publish-images.outputs.release_tag }}
        run: |
          set -euo pipefail

          payload_patch=$(cat <<JSON
          {
            "deployment": {
              "external": {
                "imagePath": "${RELEASED_MIGRATE_IMAGE}",
                "credentials": "${NORTHFLANK_REGISTRY_CREDENTIALS_ID}"
              }
            }
          }
          JSON
          )

          body_file="$(mktemp)"
          status_code=$(curl -sS -o "$body_file" -w '%{http_code}' \
            -X PATCH \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $NORTHFLANK_API_KEY" \
            -d "$payload_patch" \
            "https://api.northflank.com/v1/projects/$NORTHFLANK_PROJECT_ID/jobs/$NORTHFLANK_MIGRATE_JOB_ID")

          if [[ "$status_code" =~ ^2 ]]; then
            echo "Migrate job image updated via PATCH /jobs/{id}"
            cat "$body_file"
            exit 0
          fi

          echo "PATCH /jobs/{id} failed with status $status_code, trying legacy deployment endpoint"
          cat "$body_file"

          payload_legacy=$(cat <<JSON
          {
            "external": {
              "imagePath": "${RELEASED_MIGRATE_IMAGE}",
              "credentials": "${NORTHFLANK_REGISTRY_CREDENTIALS_ID}"
            }
          }
          JSON
          )

          status_code=$(curl -sS -o "$body_file" -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $NORTHFLANK_API_KEY" \
            -d "$payload_legacy" \
            "https://api.northflank.com/v1/projects/$NORTHFLANK_PROJECT_ID/jobs/$NORTHFLANK_MIGRATE_JOB_ID/deployment")

          if [[ "$status_code" =~ ^2 ]]; then
            echo "Migrate job image updated via POST /jobs/{id}/deployment"
            cat "$body_file"
            exit 0
          fi

          echo "Could not update migrate job image"
          cat "$body_file"
          exit 1

      - name: Run migrate job
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: run-migrate
        shell: bash
        env:
          NORTHFLANK_PROJECT_ID: ${{ vars.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_MIGRATE_JOB_ID: ${{ vars.NORTHFLANK_MIGRATE_JOB_ID }}
        run: |
          set -euo pipefail

          response=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $NORTHFLANK_API_KEY" \
            -d '{}' \
            "https://api.northflank.com/v1/projects/$NORTHFLANK_PROJECT_ID/jobs/$NORTHFLANK_MIGRATE_JOB_ID/runs")

          echo "$response"

          run_id=$(echo "$response" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{try{const json=JSON.parse(data);process.stdout.write(json?.data?.id ?? '');}catch{process.stdout.write('');}});")
          if [ -z "$run_id" ]; then
            echo "Could not create migrate job run"
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Wait for migrate job completion
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        shell: bash
        env:
          NORTHFLANK_PROJECT_ID: ${{ vars.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_MIGRATE_JOB_ID: ${{ vars.NORTHFLANK_MIGRATE_JOB_ID }}
          NORTHFLANK_RUN_ID: ${{ steps.run-migrate.outputs.run_id }}
        run: |
          set -euo pipefail

          for _ in $(seq 1 60); do
            response=$(curl -sS \
              -H "Authorization: Bearer $NORTHFLANK_API_KEY" \
              "https://api.northflank.com/v1/projects/$NORTHFLANK_PROJECT_ID/jobs/$NORTHFLANK_MIGRATE_JOB_ID/runs/$NORTHFLANK_RUN_ID")

            status=$(echo "$response" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{try{const json=JSON.parse(data);process.stdout.write(json?.data?.status ?? '');}catch{process.stdout.write('');}});")
            concluded=$(echo "$response" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{try{const json=JSON.parse(data);process.stdout.write(String(json?.data?.concluded ?? false));}catch{process.stdout.write('false');}});")

            echo "Migrate run status: $status"

            if [ "$concluded" = "true" ]; then
              if [ "$status" = "SUCCESS" ]; then
                exit 0
              fi

              echo "Migrate job concluded with non-success status: $status"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for migrate job completion"
          exit 1

  deploy-api-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - publish-images
      - deploy-migrate-job
    if: ${{ vars.NORTHFLANK_PROJECT_ID != '' && vars.NORTHFLANK_SERVICE_ID != '' && vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID != '' && (needs.deploy-migrate-job.result == 'success' || needs.deploy-migrate-job.result == 'skipped') }}
    env:
      NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}

    steps:
      - name: Preflight deploy secret check
        id: preflight
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NORTHFLANK_API_KEY:-}" ]; then
            echo "Northflank API key is not configured, skipping deploy-api-service."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy released runtime image to API service
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ env.NORTHFLANK_API_KEY }}
          project-id: ${{ vars.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ vars.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ needs.publish-images.outputs.runtime_image }}:${{ needs.publish-images.outputs.release_tag }}
          credentials-id: ${{ vars.NORTHFLANK_REGISTRY_CREDENTIALS_ID }}
