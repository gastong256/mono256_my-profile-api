name: mono256-my-profile-api

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mono256_my_profile
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d mono256_my_profile']
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/mono256_my_profile
      DIRECT_URL: postgresql://user:password@postgres:5432/mono256_my_profile
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  seed:
    build:
      context: .
      target: seed
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/mono256_my_profile
      DIRECT_URL: postgresql://user:password@postgres:5432/mono256_my_profile
      SEED_USER_EMAIL: admin@gastong256.dev
      SEED_USER_NAME: Admin User
      SEED_USER_PASSWORD: ChangeMe123!
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: 'no'

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
      APP_BASE_URL: http://localhost:4000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://user:password@postgres:5432/mono256_my_profile
      DIRECT_URL: postgresql://user:password@postgres:5432/mono256_my_profile
      CORS_ORIGIN: http://localhost:3000,http://localhost:4000
      JWT_SECRET: ${JWT_SECRET:-change_me_change_me_change_me_change_me}
      JWT_EXPIRES_IN: 1d
      SWAGGER_ENABLED: 'true'
      RATE_LIMIT_ENABLED: 'true'
      TRUST_PROXY: 'false'
      CONTACT_MIN_INTERVAL_SECONDS: 10
      CONTACT_MAX_BY_IP_PER_HOUR: 30
      CONTACT_MAX_BY_EMAIL_PER_HOUR: 8
      CONTACT_DUPLICATE_WINDOW_MINUTES: 60
      CONTACT_FINGERPRINT_SALT: local_docker_contact_salt_12345
      CONTACT_REQUIRE_TURNSTILE: 'false'
      TURNSTILE_SECRET_KEY: ''
      AUTH_RATE_LIMIT_MAX: 5
      AUTH_RATE_LIMIT_WINDOW: 1 minute
      CONTACT_RATE_LIMIT_MAX: 10
      CONTACT_RATE_LIMIT_WINDOW: 1 minute
      BOOTSTRAP_ADMIN_ENABLED: 'false'
      BOOTSTRAP_ADMIN_UPDATE_EXISTING: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    ports:
      - '4000:4000'

volumes:
  postgres_data:
